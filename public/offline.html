<!doctype html>
<html lang="de">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>StackAtlas – Offline</title>
		<style>
			:root {
				color-scheme: light dark;
				font-family: system-ui, sans-serif;
			}

			body {
				margin: 0;
				display: grid;
				place-items: center;
				min-height: 100vh;
				padding: 1.5rem;
				background: #f6f8fb;
				color: #102a43;
			}

			main {
				max-width: 32rem;
				background: #fff;
				border: 1px solid #d9e2ec;
				border-radius: 0.75rem;
				padding: 1.5rem;
				box-shadow: 0 8px 24px rgb(16 42 67 / 8%);
			}

			h1 {
				margin-top: 0;
				font-size: 1.5rem;
			}

			p {
				line-height: 1.5;
			}
		</style>
	</head>
	<body>
		<main>
			<h1>Du bist offline</h1>
			<p>StackAtlas ist grundsätzlich offline-fähig. Diese Seite erscheint, wenn ein Bereich noch nicht vollständig im Cache vorhanden ist.</p>
			<p>Bitte verbinde dich kurz mit dem Internet und lade die gewünschte Ansicht einmalig.</p>
		</main>
	</body>
</html>
