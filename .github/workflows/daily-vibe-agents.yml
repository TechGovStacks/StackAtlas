name: Daily Vibe AGENTS.md Processing

on:
  schedule:
    - cron: '0 1 * * *' # 1 UTC = 2 MEZ (Winter) / 3 MESZ (Summer)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Vibe CLI
        run: curl -LsSf https://mistral.ai/vibe/install.sh | bash

      - name: Ensure Vibe is in PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Execute AGENTS.md tasks with Vibe
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          vibe --trust "Lies die Datei data/items/AGENTS.md und führe alle darin enthaltenen Aufgaben und Anweisungen aus. Arbeite alle Tasks ab, die in der Datei definiert sind. Aktualisiere Dateien im Repository wie in AGENTS.md beschrieben. Committe die Änderungen nicht selbst - das übernimmt der nächste Schritt."

      - name: Check for changes
        id: verify-changed-files
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.verify-changed-files.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: main
          branch: auto-execute-agents-md
          commit-message: 'chore: execute AGENTS.md tasks via Vibe'
          title: 'chore: execute AGENTS.md tasks via Vibe'
          body: 'Automatische Abarbeitung der Aufgaben aus data/items/AGENTS.md durch Mistral Vibe.'
          delete-branch: true
          author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
